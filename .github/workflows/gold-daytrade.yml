name: gold-daytrade
on:
  schedule:
    - cron: "*/5 0-9 * * 1-5"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install numpy pandas
      - name: daytrade
        env:
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
        run: python gold_daytrade_cloud.py
      - name: save state
        run: |
          if [ -n "$(git status --porcelain state/)" ]; then
            git config user.name github-actions
            git config user.email actions@github.com
            git add state/
            git commit -m "update daytrade state"
            git push
          fi
